# ServiceNow MCP Tool Packages Configuration
# Define sets of tools to be exposed by the MCP server based on roles/workflows.
# The MCP server loads tools based on the MCP_TOOL_PACKAGE environment variable.
# If MCP_TOOL_PACKAGE is not set, 'full' is loaded.
# If MCP_TOOL_PACKAGE is set to 'none', no tools are loaded (except list_tool_packages).

# --- Package Definitions ---

none: []

# Natural-language shortcuts. Useful as a power-user quick path but
# overlap with the more precise structured tools (list_incidents,
# update_incident), so they're opt-in via this dedicated package and
# NOT included in 'full' by default. The parser is rule-based regex
# (see src/servicenow_mcp/utils/nl.py) — no LLM at the server layer.
nl_power_user:
  - natural_language_search
  - natural_language_update

