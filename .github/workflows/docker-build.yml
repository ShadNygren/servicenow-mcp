name: Build and publish Docker image

# Adapted from windoze95/servicenow-mcp commit chain (Julian Dice).
# Builds the Docker image on every push to main and on every PR.
# Pushes to GHCR (ghcr.io/<owner>/servicenow-mcp) only on main pushes,
# never on pull requests (to avoid leaking PR-author code as a published
# image). Tags `latest` for main and `sha-<short>` for traceability.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip login on PRs from forks — they don't have access to GITHUB_TOKEN
        # with packages:write anyway.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch

      - name: Build and (on main push) push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # Push only on push events (not PRs) and only when on the
          # default branch. Local PR builds verify the image builds
          # but don't publish.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
